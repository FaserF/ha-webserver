name: Bug Report
description: Report a bug with the Webserver App Home Assistant integration
title: '[Bug]: '
labels: ['bug', 'triage']
assignees:
  - FaserF
body:
  - type: markdown
    attributes:
      value: |
        ## Before submitting
        - 🔍 Search [existing issues](https://github.com/FaserF/ha-webserver/issues) to avoid duplicates
        - 📖 Check the [App Documentation Site](https://faserf.github.io/hassio-addons/) & [Integration README](https://github.com/FaserF/ha-webserver)
        - 🔗 View the integration: [![Open your Home Assistant instance and show the webserver_app integration.](https://my.home-assistant.io/badges/integration.svg)](https://my.home-assistant.io/redirect/integration/?domain=webserver_app)

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: Which version of ha-webserver are you running? (HACS or integration page)
      placeholder: e.g. v0.0.1
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: |
        [![Open your Home Assistant instance and show your Home Assistant version information.](https://my.home-assistant.io/badges/info.svg)](https://my.home-assistant.io/redirect/info/)
      placeholder: e.g. 2026.6.4
    validations:
      required: true

  - type: dropdown
    id: ha_install_type
    attributes:
      label: Home Assistant Installation Type
      description: |
        Can be found in: [![Open your Home Assistant instance and show your Home Assistant version information.](https://my.home-assistant.io/badges/info.svg)](https://my.home-assistant.io/redirect/info/)
      options:
        - Home Assistant OS
        - Home Assistant Container
        - Home Assistant Supervised
        - Home Assistant Core
    validations:
      required: true

  - type: input
    id: webserver_version
    attributes:
      label: Webserver version / OS
      description: Which version of Apache2/Nginx App (Addon) is running?
      placeholder: e.g. 25.12.4
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Configure integration with '...'
        2. Navigate to '...'
        3. See error / unexpected behavior
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: |
        Download diagnostics from the integration page and paste here (very helpful!):
        [![Open your Home Assistant instance and show the webserver_app integration.](https://my.home-assistant.io/badges/integration.svg)](https://my.home-assistant.io/redirect/integration/?domain=webserver_app)
      render: json
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Enable debug logging and paste relevant log lines here.
        Add to `configuration.yaml`:
        ```yaml
        logger:
          default: warning
          logs:
            custom_components.webserver_app: debug
        ```
      render: shell
    validations:
      required: true
